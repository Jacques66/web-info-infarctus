  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"232fdf21-2113-49cb-97b6-32d9d340df9e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    * { margin: 0; padding: 0; box-sizing: border-box; }\n    html, body { background: #52565e; }\n    a { color: #C1121F; }\n    a:hover { color: #8f0d17; }\n    @page { size: A4 portrait; margin: 0; }\n    @media print {\n      html, body { background: #fff; }\n      .sheet { box-shadow: none !important; margin: 0 !important; }\n      .print-btn { display: none !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"display:flex; justify-content:center; padding:28px 16px; font-family:'Public Sans', sans-serif;\">\n  <button class=\"print-btn\" onclick=\"{{ printSheet }}\" style=\"position:fixed; top:20px; right:20px; z-index:50; display:flex; align-items:center; gap:8px; background:#C1121F; color:#fff; border:none; border-radius:9px; padding:11px 18px; font-family:'Archivo',sans-serif; font-weight:800; font-size:13px; letter-spacing:.02em; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.3);\" style-hover=\"background:#8f0d17;\">\n    <span style=\"font-size:15px;\">⎙<\u002Fspan> Imprimer la fiche\n  <\u002Fbutton>\n  <div class=\"sheet\" style=\"width:794px; min-height:1123px; background:#ffffff; padding:34px 38px 30px; box-shadow:0 8px 40px rgba(0,0,0,.35); display:flex; flex-direction:column; color:#16181d;\">\n\n    <!-- HEADER -->\n    <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:20px; border-bottom:3px solid #16181d; padding-bottom:14px;\">\n      <div style=\"flex:1;\">\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:10px; letter-spacing:.22em; color:#C1121F; text-transform:uppercase;\">Fiche à afficher · à connaître par cœur<\u002Fdiv>\n        <h1 style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:33px; line-height:1.02; letter-spacing:-.01em; margin-top:5px;\">CRISE CARDIAQUE&nbsp;: LE PLAN D'URGENCE<\u002Fh1>\n        <p style=\"font-size:12.5px; color:#3a3d44; margin-top:6px; max-width:52ch;\">Un infarctus bloque une artère du cœur&nbsp;: le muscle privé d'oxygène commence à mourir en quelques dizaines de minutes. <strong>« Le temps, c'est du muscle »<\u002Fstrong> — agir vite préserve le cœur.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:0 0 auto; background:#C1121F; color:#fff; border-radius:10px; padding:12px 16px; text-align:center; min-width:160px;\">\n        <div style=\"font-size:10px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; opacity:.9;\">Appeler tout de suite<\u002Fdiv>\n        <div style=\"display:flex; align-items:baseline; justify-content:center; gap:10px; margin-top:2px;\">\n          <span style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:40px; line-height:1;\">15<\u002Fspan>\n          <span style=\"font-size:16px; font-weight:700; opacity:.8;\">ou<\u002Fspan>\n          <span style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:40px; line-height:1;\">112<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:11.5px; font-weight:700; margin-top:3px;\">SAMU · Urgences européennes<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- THREE COLUMNS -->\n    <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:0; margin-top:16px; border:1px solid #e2e2df;\">\n\n      <!-- SE PRÉPARER -->\n      <section style=\"padding:14px 15px; border-right:1px solid #e2e2df;\">\n        <div style=\"display:flex; align-items:center; gap:8px;\">\n          <span style=\"width:9px; height:9px; border-radius:50%; background:#0F6E8C;\"><\u002Fspan>\n          <h2 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:14px; letter-spacing:.02em; color:#0F6E8C;\">SE PRÉPARER<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"font-size:10px; font-weight:600; color:#7a7d84; text-transform:uppercase; letter-spacing:.08em; margin:2px 0 9px;\">Au calme, dès aujourd'hui<\u002Fdiv>\n        <ul style=\"list-style:none; display:flex; flex-direction:column; gap:8px; font-size:11.5px; line-height:1.32; color:#26282e;\">\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#0F6E8C; font-weight:800;\">›<\u002Fspan><span><strong>Vérifier régulièrement les dates de péremption<\u002Fstrong> de vos médicaments et les renouveler avant qu'ils ne soient périmés.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#0F6E8C; font-weight:800;\">›<\u002Fspan><span>Demander à votre médecin, en consultation, si vous pouvez garder de l'<strong>aspirine 300&nbsp;mg<\u002Fstrong> à domicile (selon vos antécédents et traitements).<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#0F6E8C; font-weight:800;\">›<\u002Fspan><span>La ranger dans un endroit <strong>connu et accessible<\u002Fstrong>.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#0F6E8C; font-weight:800;\">›<\u002Fspan><span>Enregistrer le <strong>15 / 112 en raccourci<\u002Fstrong>&nbsp;; garder le téléphone chargé et à portée.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#0F6E8C; font-weight:800;\">›<\u002Fspan><span>Écrire votre <strong>adresse complète<\u002Fstrong> (étage, code, digicode) près du téléphone.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#0F6E8C; font-weight:800;\">›<\u002Fspan><span>Confier un <strong>double des clés<\u002Fstrong> à un voisin ou un proche de confiance.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#0F6E8C; font-weight:800;\">›<\u002Fspan><span>Connaître vos <strong>facteurs de risque<\u002Fstrong>&nbsp;: hypertension, diabète, cholestérol, tabac, hérédité.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fsection>\n\n      <!-- SIGNES PRÉCURSEURS -->\n      <section style=\"padding:14px 15px; border-right:1px solid #e2e2df;\">\n        <div style=\"display:flex; align-items:center; gap:8px;\">\n          <span style=\"width:9px; height:9px; border-radius:50%; background:#B7791F;\"><\u002Fspan>\n          <h2 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:14px; letter-spacing:.02em; color:#B7791F;\">SIGNES PRÉCURSEURS<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"font-size:10px; font-weight:600; color:#7a7d84; text-transform:uppercase; letter-spacing:.08em; margin:2px 0 9px;\">Heures à jours avant<\u002Fdiv>\n        <ul style=\"list-style:none; display:flex; flex-direction:column; gap:8px; font-size:11.5px; line-height:1.32; color:#26282e;\">\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#B7791F; font-weight:800;\">›<\u002Fspan><span><strong>Fatigue profonde et inhabituelle<\u002Fstrong>, sans rapport avec l'effort fourni (très fréquent chez la femme).<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#B7791F; font-weight:800;\">›<\u002Fspan><span><strong>Gêne ou pression dans la poitrine à l'effort<\u002Fstrong> (escaliers, marche rapide) qui n'existait pas avant — c'est l'angine de poitrine.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#B7791F; font-weight:800;\">›<\u002Fspan><span><strong>Essoufflement anormal<\u002Fstrong> pour des activités habituelles.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#B7791F; font-weight:800;\">›<\u002Fspan><span><strong>Insomnie inhabituelle<\u002Fstrong> avec anxiété diffuse.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#B7791F; font-weight:800;\">›<\u002Fspan><span><strong>Palpitations<\u002Fstrong> ou battements irréguliers répétés.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div style=\"margin-top:11px; background:#fdf6e7; border:1px solid #ead9a8; border-radius:7px; padding:9px 11px; font-size:11px; line-height:1.35; color:#6b4e10;\">\n          <strong>Ne pas attendre que ça passe.<\u002Fstrong> Consultez votre médecin ou les urgences et demandez un <strong>électrocardiogramme (ECG)<\u002Fstrong>. L'infarctus évité est le meilleur de tous.\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SYMPTÔMES -->\n      <section style=\"padding:14px 15px;\">\n        <div style=\"display:flex; align-items:center; gap:8px;\">\n          <span style=\"width:9px; height:9px; border-radius:50%; background:#C1440E;\"><\u002Fspan>\n          <h2 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:14px; letter-spacing:.02em; color:#C1440E;\">SYMPTÔMES<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"font-size:10px; font-weight:600; color:#7a7d84; text-transform:uppercase; letter-spacing:.08em; margin:2px 0 9px;\">Pendant la crise<\u002Fdiv>\n        <ul style=\"list-style:none; display:flex; flex-direction:column; gap:8px; font-size:11.5px; line-height:1.32; color:#26282e;\">\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#C1440E; font-weight:800;\">›<\u002Fspan><span><strong>Pression, poids ou serrement au centre de la poitrine<\u002Fstrong> pouvant durer plus de 20&nbsp;min — pas forcément une douleur aiguë.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#C1440E; font-weight:800;\">›<\u002Fspan><span><strong>Douleur qui irradie<\u002Fstrong>&nbsp;: bras (gauche ou droit), mâchoire, cou, dos.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#C1440E; font-weight:800;\">›<\u002Fspan><span><strong>Sueurs froides<\u002Fstrong> soudaines, sans raison apparente.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#C1440E; font-weight:800;\">›<\u002Fspan><span><strong>Nausées ou malaise<\u002Fstrong> (parfois seul signe, surtout chez la femme).<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:7px;\"><span style=\"color:#C1440E; font-weight:800;\">›<\u002Fspan><span><strong>Essoufflement<\u002Fstrong>, sensation d'angoisse intense.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div style=\"margin-top:11px; background:#fdeee7; border:1px solid #f0c3ab; border-radius:7px; padding:9px 11px; font-size:11px; line-height:1.35; color:#8a2d0a;\">\n          Après 60 ans avec un facteur de risque, tout symptôme durant <strong>plus de 5 minutes = infarctus jusqu'à preuve du contraire.<\u002Fstrong> Ne jamais minimiser (« reflux », « stress »).\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ACTIONS -->\n    <section style=\"margin-top:16px; flex:1; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:baseline; gap:10px; background:#C1121F; color:#fff; padding:9px 16px; border-radius:8px 8px 0 0;\">\n        <h2 style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:17px; letter-spacing:.03em;\">ACTIONS — LES 4 GESTES QUI SAUVENT<\u002Fh2>\n        <span style=\"font-size:11px; font-weight:600; opacity:.9;\">Dans cet ordre, sans perdre de temps<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid #e2e2df; border-top:none; padding:15px 16px; display:grid; grid-template-columns:1fr 1fr; gap:13px;\">\n\n        <div style=\"display:flex; gap:11px;\">\n          <div style=\"flex:0 0 auto; width:30px; height:30px; border-radius:50%; background:#16181d; color:#fff; font-family:'Archivo',sans-serif; font-weight:800; font-size:16px; display:flex; align-items:center; justify-content:center;\">1<\u002Fdiv>\n          <div style=\"font-size:12px; line-height:1.36;\">\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:13.5px; margin-bottom:2px;\">APPELER<\u002Fdiv>\n            Composez le <strong>15<\u002Fstrong> (ou 112). Dites&nbsp;: <em>« Je crois que je fais un infarctus, je suis seul, mon adresse est… »<\u002Fem>. <strong>Ne raccrochez pas.<\u002Fstrong> Puis <strong>déverrouillez la porte<\u002Fstrong> pour les secours.\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:11px;\">\n          <div style=\"flex:0 0 auto; width:30px; height:30px; border-radius:50%; background:#16181d; color:#fff; font-family:'Archivo',sans-serif; font-weight:800; font-size:16px; display:flex; align-items:center; justify-content:center;\">2<\u002Fdiv>\n          <div style=\"font-size:12px; line-height:1.36;\">\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:13.5px; margin-bottom:2px;\">S'INSTALLER<\u002Fdiv>\n            Position <strong>demi-assise<\u002Fstrong>&nbsp;: dos calé contre un mur ou une chaise, genoux pliés. <strong>Ne vous allongez PAS à plat.<\u002Fstrong> Restez immobile, ne faites aucun effort.\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:11px;\">\n          <div style=\"flex:0 0 auto; width:30px; height:30px; border-radius:50%; background:#C1121F; color:#fff; font-family:'Archivo',sans-serif; font-weight:800; font-size:16px; display:flex; align-items:center; justify-content:center;\">3<\u002Fdiv>\n          <div style=\"font-size:12px; line-height:1.36;\">\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:13.5px; margin-bottom:2px;\">MÂCHER UNE ASPIRINE<\u002Fdiv>\n            <strong>300&nbsp;mg, à mâcher<\u002Fstrong> (ne pas avaler entière) — agit plus vite. <strong>Sauf contre-indication<\u002Fstrong>&nbsp;: allergie, ulcère / saignement digestif, traitement anticoagulant. En cas de doute, suivez l'opérateur du 15. <em>Jamais d'ibuprofène ni de paracétamol à la place.<\u002Fem>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:11px;\">\n          <div style=\"flex:0 0 auto; width:30px; height:30px; border-radius:50%; background:#16181d; color:#fff; font-family:'Archivo',sans-serif; font-weight:800; font-size:16px; display:flex; align-items:center; justify-content:center;\">4<\u002Fdiv>\n          <div style=\"font-size:12px; line-height:1.36;\">\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:13.5px; margin-bottom:2px;\">RESPIRER, RESTER CALME<\u002Fdiv>\n            Méthode <strong>4-7-8<\u002Fstrong>&nbsp;: inspirez <strong>4&nbsp;s<\u002Fstrong> par le nez, <strong>retenez 7&nbsp;s<\u002Fstrong>, expirez <strong>8&nbsp;s<\u002Fstrong> par la bouche. Répétez-vous&nbsp;: <em>« les secours arrivent, je dois juste rester calme. »<\u002Fem>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- NE JAMAIS FAIRE -->\n      <div style=\"margin-top:12px; border:1.5px solid #16181d; border-radius:8px; overflow:hidden;\">\n        <div style=\"background:#16181d; color:#fff; font-family:'Archivo',sans-serif; font-weight:800; font-size:12.5px; letter-spacing:.04em; padding:7px 14px;\">À NE JAMAIS FAIRE — ERREURS QUI TUENT<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px 20px; padding:11px 15px; font-size:11px; line-height:1.3;\">\n          <div style=\"display:flex; gap:6px;\"><span style=\"color:#C1121F; font-weight:800;\">✕<\u002Fspan> Conduire soi-même à l'hôpital<\u002Fdiv>\n          <div style=\"display:flex; gap:6px;\"><span style=\"color:#C1121F; font-weight:800;\">✕<\u002Fspan> Attendre « que ça passe »<\u002Fdiv>\n          <div style=\"display:flex; gap:6px;\"><span style=\"color:#C1121F; font-weight:800;\">✕<\u002Fspan> Marcher ou faire un effort<\u002Fdiv>\n          <div style=\"display:flex; gap:6px;\"><span style=\"color:#C1121F; font-weight:800;\">✕<\u002Fspan> Boire ou manger (sauf l'aspirine)<\u002Fdiv>\n          <div style=\"display:flex; gap:6px;\"><span style=\"color:#C1121F; font-weight:800;\">✕<\u002Fspan> Laisser la porte fermée à clé<\u002Fdiv>\n          <div style=\"display:flex; gap:6px;\"><span style=\"color:#C1121F; font-weight:800;\">✕<\u002Fspan> Tousser fort (« cough CPR », inutile ici)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"margin-top:14px; padding-top:9px; border-top:1px solid #e2e2df; display:flex; justify-content:space-between; align-items:center; font-size:9.5px; color:#8a8d94; line-height:1.3;\">\n      <span>Fiche d'information — ne remplace pas un avis médical. En urgence, appelez toujours le <strong>15<\u002Fstrong> ou le <strong>112<\u002Fstrong>.<\u002Fspan>\n      <span style=\"font-family:'Archivo',sans-serif; font-weight:700; color:#C1121F;\">⌚ CHAQUE MINUTE COMPTE<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return { printSheet: () => window.print() };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
